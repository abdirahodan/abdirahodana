[build]
command = "hugo"
publish = "public"
[build.environment]
HUGO_VERSION = "0.80.0"

[context]
[context.branch-deploy]
command = "hugo -F -b $DEPLOY_PRIME_URL"
[context.deploy-preview]
command = "hugo -F -b $DEPLOY_PRIME_URL"
[context.production]
[context.production.environment]
HUGO_ENV = "production"

[[redirects]]
  from = "/26Nikkah"
  to = "https://preview.canva.site/bcf1b258-a63c-4c49-8305-133daf9766df/hodanabdirahman.com/2026nikkah"
  status = 301
  force = true
